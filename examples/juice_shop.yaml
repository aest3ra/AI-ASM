target: http://localhost:3000/

# Default scope: only localhost (strict-host).
# Juice Shop은 단일 호스트 SPA이므로 추가 도메인 불필요.

limits:
  max_pages: 50
  max_duration_sec: 600
  rate_limit_rps: 3
  max_visits_per_template: 3

auth:
  type: storage_state
  storage_state_path: ./auth.json

# Static analyzer가 찾은 GET 후보를 직접 probe할 때의 인증 처리.
# cookie-only: storage_state 쿠키만 사용 (기본)
# learned: 실제 브라우저 요청에서 관측된 Authorization 헤더를 same-origin probe에 재사용
static_probe_auth: cookie-only
