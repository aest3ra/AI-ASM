target: http://localhost:5016/

scope:
  include_domains:
    - localhost
  exclude_paths: []

limits:
  max_pages: 40
  max_duration_sec: 240
  rate_limit_rps: 2
  max_visits_per_template: 3

auth:
  type: none

static_probe_auth: none

agent:
  mode: planner
  model: gpt-5-mini
  max_steps_per_page: 16
  form_data_path: testdata/forms/default.yaml
