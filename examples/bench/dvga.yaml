target: http://localhost:5013/

scope:
  include_domains:
    - localhost
  exclude_paths:
    - /logout
    - /signout

limits:
  max_pages: 80
  max_duration_sec: 420
  rate_limit_rps: 2
  max_visits_per_template: 3

auth:
  type: none

static_probe_auth: cookie-only

agent:
  mode: planner
  model: gpt-5-mini
  max_steps_per_page: 24
  form_data_path: testdata/forms/default.yaml
