target: https://www.catholic.ac.kr/

# scope.include_domains is omitted on purpose: by default the crawler stays on
# the target's exact host (www.catholic.ac.kr). To also follow links into
# subdomains like e-cyber.catholic.ac.kr, list them explicitly:
#   scope:
#     include_domains:
#       - catholic.ac.kr
#       - "*.catholic.ac.kr"

limits:
  max_pages: 30
  max_duration_sec: 600
  rate_limit_rps: 2
  max_visits_per_template: 3

auth:
  type: none
