target: http://localhost:3000/

# Default scope: only the target's exact host (juice-shop.example.com).
# Uncomment to expand to subdomains:
# scope:
#   include_domains:
#     - juice-shop.example.com
#     - "*.juice-shop.example.com"
scope:
  exclude_paths:
    - /logout
    - /signout
    - /admin/dangerous-action

limits:
  max_pages: 200
  max_duration_sec: 600
  rate_limit_rps: 2
  max_visits_per_template: 3

auth:
  type: none
  # type: storage_state
  # storage_state_path: ./auth.json

# Static GET probe auth mode: none | cookie-only | learned
static_probe_auth: cookie-only

agent:
  mode: planner     # planner | mock | llm
  model: gpt-5-mini
  max_steps_per_page: 24
  form_data_path: testdata/forms/default.yaml
