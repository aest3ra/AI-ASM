targets:
  juice_shop:
    description: "OWASP Juice Shop: Angular SPA, auth-gated UI, REST endpoints."
    health_url: "http://localhost:3000/"
    scan_config: "examples/juice_shop.yaml"
    form_data: "examples/juice_shop_form_data.yaml"
    agent: "llm"
    agent_budget: 24
    required_files:
      - "auth.json"
    coverage:
      type: "juice_shop"
      expected: "tests/fixtures/juice_shop_expected_api_paths.txt"
      public_only: true
    thresholds:
      coverage_min: 95.0
      max_input_tokens: 120000

  crapi:
    description: "OWASP crAPI: multi-service React + REST API benchmark."
    health_url: "http://localhost:8888/"
    scan_config: "examples/crapi_scan_config.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "llm"
    agent_budget: 24
    coverage:
      type: "openapi"
      spec: ".research/crapi/crapi-openapi-spec-running.json"
    thresholds:
      coverage_min: 75.0
      max_input_tokens: 60000

  webgoat:
    description: "OWASP WebGoat: Java/Spring Boot lesson UI with session-heavy flows."
    health_url: "http://localhost:8081/WebGoat/"
    scan_config: "examples/bench/webgoat.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 24
    coverage:
      type: "none"

  dvwa:
    description: "DVWA: PHP/Apache/MariaDB classic MPA and form-heavy benchmark."
    health_url: "http://localhost:4280/"
    scan_config: "examples/bench/dvwa.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 24
    coverage:
      type: "none"

  dvga:
    description: "DVGA: Python/Flask GraphQL benchmark."
    health_url: "http://localhost:5013/"
    scan_config: "examples/bench/dvga.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 24
    coverage:
      type: "none"

  vampi:
    description: "VAmPI: Flask vulnerable REST API with Swagger UI and OpenAPI spec."
    health_url: "http://localhost:5002/"
    scan_config: "examples/bench/vampi.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 16
    coverage:
      type: "path_list"
      expected: "tests/fixtures/vampi_expected_api_paths.txt"
    thresholds:
      coverage_min: 90.0

  petstore:
    description: "Swagger Petstore: Java/JAX-RS OpenAPI sample API."
    health_url: "http://localhost:5014/api/v3/openapi.json"
    scan_config: "examples/bench/petstore.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 16
    coverage:
      type: "path_list"
      expected: "tests/fixtures/petstore_expected_api_paths.txt"
    thresholds:
      coverage_min: 90.0

  restful_booker:
    description: "Restful Booker: Node/Express API with HTML API docs."
    health_url: "http://localhost:5016/ping"
    scan_config: "examples/bench/restful_booker.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 16
    coverage:
      type: "path_list"
      expected: "tests/fixtures/restful_booker_expected_api_paths.txt"

  go_httpbin:
    description: "go-httpbin: Go HTTP client testing service with HTML docs/forms."
    health_url: "http://localhost:5015/"
    scan_config: "examples/bench/go_httpbin.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 16
    coverage:
      type: "path_list"
      expected: "tests/fixtures/go_httpbin_expected_api_paths.txt"

  dvna:
    enabled: false
    description: "DVNA: Node.js/Express benchmark using the SQLite image."
    health_url: "http://localhost:9092/"
    scan_config: "examples/bench/dvna.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 24
    coverage:
      type: "none"

  webgoat_dotnet:
    enabled: false
    description: "OWASP WebGoat.NET: ASP.NET vulnerable app container."
    health_url: "http://localhost:9000/"
    scan_config: "examples/bench/webgoat_dotnet.yaml"
    form_data: "testdata/forms/default.yaml"
    agent: "planner"
    agent_budget: 24
    coverage:
      type: "none"
