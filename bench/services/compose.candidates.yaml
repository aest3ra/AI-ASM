name: ai-asm-bench-candidates

services:
  webgoat:
    image: webgoat/webgoat:latest
    container_name: ai-asm-webgoat
    platform: linux/amd64
    environment:
      TZ: UTC
    ports:
      - "127.0.0.1:8081:8080"
      - "127.0.0.1:9091:9090"
    restart: unless-stopped

  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    container_name: ai-asm-dvwa
    platform: linux/amd64
    pull_policy: always
    environment:
      DB_SERVER: dvwa-db
    depends_on:
      - dvwa-db
    ports:
      - "127.0.0.1:4280:80"
    restart: unless-stopped

  dvwa-db:
    image: docker.io/library/mariadb:10
    container_name: ai-asm-dvwa-db
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: dvwa
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: p@ssw0rd
    volumes:
      - dvwa-db:/var/lib/mysql
    restart: unless-stopped

  dvga:
    image: dolevf/dvga:latest
    container_name: ai-asm-dvga
    platform: linux/amd64
    environment:
      WEB_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:5013:5013"
    restart: unless-stopped

  vampi:
    image: erev0s/vampi:latest
    container_name: ai-asm-vampi
    platform: linux/amd64
    environment:
      vulnerable: "1"
      tokentimetolive: "3600"
    ports:
      - "127.0.0.1:5002:5000"
    restart: unless-stopped

  petstore:
    image: swaggerapi/petstore3:unstable
    container_name: ai-asm-petstore
    platform: linux/amd64
    ports:
      - "127.0.0.1:5014:8080"
    restart: unless-stopped

  restful-booker:
    image: mwinteringham/restfulbooker:latest
    container_name: ai-asm-restful-booker
    platform: linux/amd64
    ports:
      - "127.0.0.1:5016:3001"
    restart: unless-stopped

  go-httpbin:
    image: ghcr.io/mccutchen/go-httpbin:latest
    container_name: ai-asm-go-httpbin
    ports:
      - "127.0.0.1:5015:8080"
    restart: unless-stopped

  dvna:
    image: appsecco/dvna:sqlite
    container_name: ai-asm-dvna
    platform: linux/amd64
    ports:
      - "127.0.0.1:9092:9090"
    restart: unless-stopped

  webgoat_dotnet:
    image: appsecco/owasp-webgoat-dot-net:latest
    container_name: ai-asm-webgoat-dotnet
    platform: linux/amd64
    ports:
      - "127.0.0.1:9000:9000"
    restart: unless-stopped

volumes:
  dvwa-db:
